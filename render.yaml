# Render "Blueprint": deploys the whole app from this one file.
#   - a PostgreSQL database
#   - the backend Express API (Web Service)
#   - the frontend React app (Static Site)
#
# How to use: Render Dashboard → New + → Blueprint → connect this repo.
# Render reads this file and creates all three. See docs/DEPLOYMENT.md for the
# click-by-click guide (including the two URLs you set after the first deploy).

databases:
  - name: amazon-clone-db
    plan: free # NOTE: Render's free database is removed after ~30 days.
    databaseName: amazon_clone
    user: amazon

services:
  # ---- Backend API ----
  - type: web
    name: amazon-clone-api
    runtime: node
    plan: free
    rootDir: backend
    # install (incl. devDeps for tsc) → generate Prisma client → compile →
    # migrate → seed → backfill images. The seed is idempotent (skips if products
    # already exist); the image backfill is non-destructive and just adds a second
    # image to any product missing one, so it fixes existing data without a wipe.
    # --include=dev is required because NODE_ENV=production otherwise skips devDeps.
    buildCommand: npm install --include=dev && npx prisma generate && npm run build && npx prisma migrate deploy && npm run db:seed && npm run db:backfill-images
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: '22' # pin to Node 22 LTS (avoid bleeding-edge Node)
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: amazon-clone-db
          property: connectionString
      # Set this to the frontend Static Site URL after the first deploy.
      - key: CORS_ORIGIN
        sync: false

  # ---- Frontend (static React build) ----
  - type: web
    name: amazon-clone-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: '22'
      # Set this to the backend API URL + "/api" after the first deploy,
      # e.g. https://amazon-clone-api.onrender.com/api
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback: send every path to index.html so React Router handles it.
      - type: rewrite
        source: /*
        destination: /index.html
